# GitHub Actions Workflow for QuizMaster Windows Build
# 自动打包 Windows 可执行程序

name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'  # 推送标签时触发，如 v1.0.0
  workflow_dispatch:  # 支持手动触发

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: 打包应用程序
      run: |
        pyinstaller --clean 逢考必过.spec

    - name: 准备分发文件
      run: |
        mkdir QuizMaster_分发版
        copy dist\QuizMaster.exe QuizMaster_分发版\
        copy quizmaster.db QuizMaster_分发版\
        copy README_用户说明.txt QuizMaster_分发版\

    - name: 压缩打包结果
      run: |
        Compress-Archive -Path QuizMaster_分发版\* -DestinationPath QuizMaster.zip

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: QuizMaster-Windows
        path: QuizMaster.zip

    - name: 创建 GitHub Release (仅标签推送时)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: QuizMaster.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
